<div class="profile-card" (click)="stopProp($event)">

  <!-- Top: avatar + email + role -->
  <div class="card-header">
    <div class="card-avatar">
      @if (photoUrl()) {
        <img [src]="photoUrl()!" class="card-avatar-img" alt="Photo de profil" />
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      }
    </div>
    <div class="card-info">
      <span class="card-email">{{ email() }}</span>
      <span class="card-role">{{ roleLabel() }}</span>
    </div>
  </div>

  <hr class="card-divider" />

  <!-- My Profile -->
  <button class="card-btn" (click)="editProfile()">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
      fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
    Mon profil
  </button>

  <hr class="card-divider" />

  <!-- Sign Out -->
  <button class="card-btn card-btn--logout" (click)="logout()">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
      fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    Se déconnecter
  </button>

</div>
