<div class="kpi-card">
  <div class="kpi-header">
    <div class="kpi-icon" [class]="'kpi-icon--' + color">
      <lucide-icon [name]="icon" [size]="20"></lucide-icon>
    </div>
    @if (badge) {
      <span class="kpi-badge" [class]="'kpi-badge--' + badgeVariant">{{ badge }}</span>
    }
  </div>

  <div class="kpi-label">{{ label }}</div>

  <div class="kpi-value">
    @if (isNumeric) {
      {{ value | number }}
    } @else {
      {{ value }}
    }
    @if (unit) { <span class="kpi-unit">{{ unit }}</span> }
  </div>

  @if (breakdown && breakdown.length > 0) {
    <div class="kpi-breakdown">
      @for (row of breakdown; track row.label) {
        <div class="kpi-breakdown-row">
          <span class="kpi-breakdown-label">{{ row.label }}</span>
          <span class="kpi-breakdown-count">{{ row.count }}</span>
        </div>
      }
    </div>
  } @else if (subtitle) {
    <div class="kpi-subtitle">{{ subtitle }}</div>
  }
</div>
