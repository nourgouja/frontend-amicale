<div class="kpi-card" [class]="'kpi-card--' + color">
  <div class="kpi-header">
    <div class="kpi-icon" [class]="'kpi-icon--' + color">
      <lucide-icon [name]="icon" [size]="18"></lucide-icon>
    </div>
    @if (trend !== undefined) {
      <span class="kpi-trend" [class.up]="trendPositive" [class.down]="!trendPositive">
        {{ trendPositive ? '↑' : '↓' }} {{ trendAbs }}%
      </span>
    }
  </div>

  <div class="kpi-value">
    @if (isNumeric) {
      {{ value | number }}
    } @else {
      {{ value }}
    }
    @if (unit) { <span class="kpi-unit">{{ unit }}</span> }
  </div>

  <div class="kpi-label">{{ label }}</div>

  @if (subtitle) {
    <div class="kpi-subtitle">{{ subtitle }}</div>
  }
</div>
