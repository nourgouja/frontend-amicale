<div class="modal-backdrop" (click)="cancelled.emit()" role="presentation">
  <div
    class="modal-card"
    role="dialog"
    aria-modal="true"
    [attr.aria-labelledby]="'modal-title'"
    (click)="$event.stopPropagation()"
  >
    <div class="modal-icon" [class]="'modal-icon--' + confirmColor">
      @if (confirmColor === 'danger') {
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      } @else if (confirmColor === 'warning') {
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      } @else {
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><polyline points="12 8 12 12 14 14"/>
        </svg>
      }
    </div>

    <h2 class="modal-title" id="modal-title">{{ title }}</h2>
    <p class="modal-message">{{ message }}</p>

    <div class="modal-actions">
      <button class="btn btn-cancel" (click)="cancelled.emit()" [disabled]="loading">
        {{ cancelLabel }}
      </button>
      <button class="btn" [class]="'btn-' + confirmColor" (click)="confirmed.emit()" [disabled]="loading">
        @if (loading) { <span class="btn-spinner"></span> }
        {{ confirmLabel }}
      </button>
    </div>
  </div>
</div>
