<div class="adherent-offres">

  <div class="page-head">
    <h1 class="page-title">Offres disponibles</h1>
    <p class="page-sub">Découvrez et inscrivez-vous aux activités de l'association</p>
  </div>

  <div class="filters-bar">
    <div class="tabs">
      @for (tab of tabs; track tab.key) {
        <button class="tab-btn" [class.active]="activeTab() === tab.key" (click)="activeTab.set(tab.key)">
          {{ tab.label }}
        </button>
      }
    </div>
    <div class="search-wrap">
      <lucide-icon name="search" [size]="15" class="search-icon"></lucide-icon>
      <input type="search" class="search-input" placeholder="Rechercher…"
             [ngModel]="searchQuery()" (ngModelChange)="searchQuery.set($event)" />
    </div>
  </div>

  @if (loading()) {
    <div class="loading-state"><div class="spinner"></div><p>Chargement des offres…</p></div>
  } @else if (filtered().length === 0) {
    <div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
        <line x1="7" y1="7" x2="7.01" y2="7"/>
      </svg>
      <p>Aucune offre disponible pour le moment</p>
    </div>
  } @else {
    <div class="offres-grid">
      @for (offre of filtered(); track offre.id) {
        <app-offer-card [offre]="offre" mode="adherent" />
      }
    </div>
  }

</div>
