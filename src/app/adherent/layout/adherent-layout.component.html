<div class="adherent-shell">

  <header class="top-nav">
    <div class="nav-brand">
      <img src="logo.png" alt="AmicaleStar" class="nav-logo" />
    </div>

    <div class="nav-actions">
      <div class="icon-wrap">
        <button class="icon-btn" aria-label="Notifications" (click)="toggleNotif($event)">
          <lucide-icon name="bell" [size]="20"></lucide-icon>
        </button>
        @if (notifOpen()) {
          <div class="dropdown notif-dropdown" (click)="$event.stopPropagation()" role="menu">
            <div class="dropdown-header">Notifications</div>
            <div class="dropdown-empty">Aucune notification</div>
          </div>
        }
      </div>

      <div class="nav-divider"></div>

      <div class="icon-wrap">
        <button class="user-btn" aria-label="Mon compte" (click)="toggleProfile($event)">
          <div class="user-info">
            <span class="user-name">{{ fullName() }}</span>
            <span class="user-role">{{ roleLabel() }}</span>
          </div>
          <div class="top-avatar">{{ initials() }}</div>
        </button>
        @if (profileOpen()) {
          <app-profile-card (close)="profileOpen.set(false)" />
        }
      </div>
    </div>
  </header>

  <main class="content">
    <router-outlet />
  </main>

  <footer class="site-footer">
    <span>© 2026 AMICALE STAR</span>
    <div class="footer-links">
      <a href="#">PRIVACY POLICY</a>
      <a href="#">TERMS OF SERVICE</a>
      <a href="#">SECURITY</a>
    </div>
  </footer>

</div>
