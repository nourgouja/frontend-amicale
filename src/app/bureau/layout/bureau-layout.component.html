<div class="bureau-shell">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="logo.png" alt="AmicaleStar" class="sidebar-logo" />
    </div>

    <div class="sidebar-area-label">Espace Bureau</div>

    <nav class="sidebar-nav" aria-label="Navigation bureau">
      @for (item of navItems; track item.route) {
        <a [routerLink]="item.route" routerLinkActive="active" class="nav-item">
          <lucide-icon [name]="item.icon" [size]="17" class="nav-icon"></lucide-icon>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="sidebar-spacer"></div>

    <div class="sidebar-footer">
      @if (authService.photoUrl()) {
        <img [src]="authService.photoUrl()!" class="sidebar-avatar sidebar-avatar--img" alt="Photo" />
      } @else {
        <div class="sidebar-avatar">{{ initials() }}</div>
      }
      <div class="sidebar-info">
        <span class="sidebar-name">{{ displayName() }}</span>
        <span class="sidebar-role">Membre Bureau</span>
      </div>
    </div>
  </aside>

  <div class="main-area">
    <header class="top-bar">
      <div class="top-bar-left">
        <div class="search-bar">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="search" placeholder="Rechercher…" class="search-input" aria-label="Rechercher" />
        </div>
      </div>

      <div class="top-bar-right">
        <div class="icon-wrap">
          <button class="icon-btn" aria-label="Notifications" (click)="toggleNotif($event)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            <span class="notif-dot" aria-hidden="true"></span>
          </button>
          @if (notifOpen()) {
            <div class="dropdown notif-dropdown" (click)="$event.stopPropagation()" role="menu">
              <div class="dropdown-header"><span>Notifications</span></div>
              <div class="dropdown-empty"><p>Aucune notification</p></div>
            </div>
          }
        </div>

        <div class="icon-wrap">
          <button class="avatar-btn" aria-label="Mon compte" (click)="toggleProfile($event)">
            @if (authService.photoUrl()) {
              <img [src]="authService.photoUrl()!" class="top-avatar top-avatar--img" alt="Photo" />
            } @else {
              <div class="top-avatar">{{ initials() }}</div>
            }
          </button>
          @if (profileOpen()) {
            <app-profile-card (close)="profileOpen.set(false)" />
          }
        </div>
      </div>
    </header>

    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>
