<div class="admin-shell">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">

    <div class="sidebar-brand">
      <img src="logo.png" alt="STAR" class="brand-logo" />
    </div>

    <nav class="sidebar-nav">
      @for (item of navItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="active"
          class="nav-item"
        >
          <span class="nav-icon" [innerHTML]="item.icon"></span>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <div style="flex:1"></div>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar">{{ initials() }}</div>
        <div class="sidebar-user-info">
          <span class="sidebar-user-name">{{ adminDisplayName() }}</span>
          <span class="sidebar-user-role">Administrateur</span>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()" title="Déconnexion">
        <!-- logout arrow icon — from the icon set row 4 pos 1 -->
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>

  </aside>

  <!-- ── Main area ── -->
  <div class="main-area">

    <header class="top-bar">
      <div class="top-bar-left">
        <div class="search-bar">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" placeholder="Rechercher..." class="search-input" />
        </div>
      </div>
      <div class="top-bar-right">
        <button class="icon-btn" title="Notifications">
          <svg xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="notif-dot"></span>
        </button>
        <div class="user-chip">
          <div class="user-avatar">{{ initials() }}</div>
        </div>
      </div>
    </header>

    <main class="content">
      <router-outlet />
    </main>

  </div>
</div>
