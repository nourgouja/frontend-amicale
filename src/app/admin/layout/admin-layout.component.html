<div class="admin-shell">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">

    <div class="sidebar-brand">
      <img src="logo.png" alt="Logo" class="sidebar-logo-img" />
    </div>

    <nav class="sidebar-nav">
      @for (item of navItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="active"
          class="nav-item"
        >
          <lucide-icon [name]="item.icon" [size]="18" class="nav-icon"></lucide-icon>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <div style="flex:1"></div>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        @if (authService.photoUrl()) {
          <img [src]="authService.photoUrl()!" class="sidebar-avatar sidebar-avatar--img" alt="Photo" />
        } @else {
          <div class="sidebar-avatar">{{ initials() }}</div>
        }
        <div class="sidebar-user-info">
          <span class="sidebar-user-name">{{ adminDisplayName() }}</span>
          <span class="sidebar-user-role">Administrateur</span>
        </div>
      </div>
    </div>

  </aside>

  <!-- ── Main area ── -->
  <div class="main-area">

    <header class="top-bar">
      <div class="top-bar-left">
        <div class="search-bar">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" placeholder="Rechercher..." class="search-input" />
        </div>
      </div>

      <div class="top-bar-right">

        <!-- Notifications -->
        <div class="profile-wrapper">
          <button class="icon-btn notif-btn" aria-label="Notifications" (click)="toggleNotif($event)">
            <svg xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            <span class="notif-dot"></span>
          </button>

          @if (notifOpen()) {
            <div class="profile-dropdown notif-dropdown" (click)="$event.stopPropagation()">
              <div class="notif-header">
                <span class="notif-title">Notifications</span>
              </div>
              <div class="dropdown-divider"></div>
              <div class="notif-empty">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                  <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
                <p>Aucune notification</p>
              </div>
            </div>
          }
        </div>

        <!-- Profile -->
        <div class="profile-wrapper">
          <button class="icon-btn profile-btn" aria-label="Mon compte" (click)="toggleProfile($event)">
            @if (authService.photoUrl()) {
              <img [src]="authService.photoUrl()!" class="top-avatar top-avatar--img" alt="Photo" />
            } @else {
              <div class="top-avatar">{{ initials() }}</div>
            }
          </button>

          @if (profileOpen()) {
            <app-profile-card (close)="profileOpen.set(false)" />
          }
        </div>

      </div>
    </header>

    <main class="content">
      <router-outlet />
    </main>

  </div>
</div>
