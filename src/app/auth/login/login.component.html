<div class="auth-shell">
  <div class="auth-page">
    <section class="auth-left">
      <img src="logo.png" alt="STAR Assurances" class="auth-logo" />
      <div class="auth-card">
        <h1 class="card-title">Bon retour</h1>
        <p class="card-subtitle">Veuillez entrer vos identifiants pour continuer</p>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
          <div class="field">
            <label class="field-label" for="email">EMAIL</label>
            <div class="input-wrap">
              <svg class="input-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
              </svg>
              <input id="email" type="email" formControlName="email"
                     placeholder="nom@star.tn" autocomplete="email" class="input" />
            </div>
          </div>

          <div class="field">
            <label class="field-label" for="password">MOT DE PASSE</label>
            <div class="input-wrap">
              <svg class="input-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input id="password" [type]="showPwd ? 'text' : 'password'" formControlName="password"
                     placeholder="••••••••" autocomplete="current-password" class="input input--pad-right" />
              <button type="button" class="eye-btn" (click)="showPwd = !showPwd" tabindex="-1">
                @if (showPwd) {
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                    <line x1="1" y1="1" x2="23" y2="23"/>
                  </svg>
                } @else {
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                  </svg>
                }
              </button>
            </div>
          </div>

          <div class="forgot-row">
            <a routerLink="/forgot-password" class="forgot-link">MOT DE PASSE OUBLIÉ ?</a>
          </div>

          @if (errorMessage()) {
            <p class="error-msg">{{ errorMessage() }}</p>
          }

          <button type="submit" class="submit-btn" [disabled]="loading()">
            {{ loading() ? 'Connexion en cours…' : 'Se connecter' }}
          </button>
        </form>

        <p class="signup-row">
          Pas encore de compte ?&nbsp;<a routerLink="/register" class="signup-link">S'inscrire</a>
        </p>
      </div>
    </section>

    <section class="auth-right">
      <img src="amicale.jpg" alt="Amicale STAR" class="auth-img" />
    </section>
  </div>

  <footer class="auth-footer">
    <span>© 2026 AMICALE STAR</span>
    <div class="footer-links">
      <a href="#">POLITIQUE DE CONFIDENTIALITÉ</a>
      <a href="#">CONDITIONS D'UTILISATION</a>
      <a href="#">SÉCURITÉ</a>
    </div>
  </footer>
</div>
