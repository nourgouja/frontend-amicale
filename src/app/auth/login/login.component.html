<div class="login-wrapper">
  <!-- Left Panel -->
  <div class="left-panel">
    <div class="logo-card">
      <img src="logo.png" alt="STAR Assurances" class="logo-img" />
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <div class="form-container">
      <h1 class="title">Login</h1>
      <p class="subtitle">Welcome back! Please enter your credentials.</p>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="Enter your email"
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" formControlName="rememberMe" />
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        @if (errorMessage()) {
          <p class="error-msg">{{ errorMessage() }}</p>
        }

        <button type="submit" class="sign-in-btn" [disabled]="loading()">
          {{ loading() ? 'Signing in…' : 'Sign In' }}
        </button>
      </form>

      <p class="contact-text">
        Don't have an account? <a href="#" class="contact-link">Contact us</a>
      </p>
    </div>
  </div>
</div>

<button class="help-btn" type="button" aria-label="Help">?</button>
